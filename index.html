<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>L'Incantesimo del Denaro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#d4a017">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Incantesimo">
    <link rel="apple-touch-icon" href="icon-192x192.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="Incantesimo del Denaro">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/telegram-web-app/7.2/telegram-web-app.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600;700&family=Crimson+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--bg:#08070d;--card:#0f0e18;--card-alt:#161522;--gold:#d4a017;--gold-light:#f0c040;--gold-dim:rgba(212,160,23,0.12);--green:#2dd4a8;--green-dim:rgba(45,212,168,0.12);--purple:#9333ea;--purple-dim:rgba(147,51,234,0.12);--blue:#3b82f6;--red:#dc2626;--orange:#f59e0b;--pink:#ec4899;--pink-dim:rgba(236,72,153,0.12);--text:#e8e4dc;--text-dim:#6a665f;--border:rgba(212,160,23,0.1)}
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        body{background:var(--bg);color:var(--text);font-family:'Crimson Pro',Georgia,serif;min-height:100vh;overflow-x:hidden;background-image:radial-gradient(ellipse at 50% 0%,rgba(212,160,23,0.03) 0%,transparent 60%)}
        .header{padding:20px 20px 14px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,rgba(212,160,23,0.06) 0%,transparent 100%);text-align:center}
        .header-brand{font-size:12px;letter-spacing:0.25em;color:var(--gold);font-family:'Cinzel',serif;text-transform:uppercase}
        .header-sub{font-size:11px;color:var(--text-dim);margin-top:3px}
        .tier-badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:10px;font-family:'JetBrains Mono',monospace;font-weight:600;margin-top:5px;background:var(--green-dim);color:var(--green);border:1px solid rgba(45,212,168,0.3)}
        .lvl-wrap{max-width:380px;margin:10px auto 0}
        .lvl-labels{display:flex;justify-content:space-between;margin-bottom:4px;font-size:11px}
        .lvl-cur{color:var(--gold);font-weight:600;font-family:'Cinzel',serif}
        .lvl-nxt{color:var(--text-dim);font-size:10px;font-family:'Cinzel',serif}
        .lvl-track{height:5px;background:rgba(212,160,23,0.08);border-radius:3px;overflow:hidden}
        .lvl-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-light));border-radius:3px;transition:width 0.5s;box-shadow:0 0 8px rgba(212,160,23,0.3)}
        .lvl-pts{font-size:10px;color:var(--text-dim);margin-top:3px;text-align:center;font-family:'JetBrains Mono',monospace}
        .nav{display:flex;gap:5px;padding:12px 12px;overflow-x:auto;justify-content:center;-webkit-overflow-scrolling:touch}
        .nav::-webkit-scrollbar{display:none}
        .nav-tab{padding:7px 11px;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--text-dim);cursor:pointer;font-size:10px;font-weight:400;font-family:'JetBrains Mono',monospace;white-space:nowrap;transition:all 0.2s}
        .nav-tab.active{background:var(--gold-dim);border-color:var(--gold);color:var(--text);font-weight:600}
        .nav-tab.active-pink{background:var(--pink-dim);border-color:rgba(236,72,153,0.4);color:var(--text);font-weight:600}
        .content{max-width:480px;margin:0 auto;padding:0 16px 40px}
        .card{background:var(--card);border-radius:14px;padding:18px;border:1px solid var(--border);margin-bottom:16px}
        .card-title{font-size:14px;font-weight:600;margin-bottom:14px;font-family:'Cinzel',serif}
        .ritual-item{display:flex;align-items:center;gap:10px;padding:12px 10px;border-radius:10px;margin-bottom:5px;cursor:pointer;border:1px solid var(--border);transition:all 0.2s}
        .ritual-box{width:28px;height:28px;border-radius:50%;flex-shrink:0;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;transition:all 0.2s;font-size:13px}
        .glow{box-shadow:0 0 15px rgba(212,160,23,0.15)}

        /* Modal */
        .modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
        .modal{background:var(--card);border-radius:16px;border:1px solid var(--border);max-width:440px;width:100%;max-height:90vh;overflow-y:auto;padding:24px}
        .modal-title{font-size:16px;font-weight:600;font-family:'Cinzel',serif;color:var(--gold);margin-bottom:6px}
        .modal-close{position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.1);border:none;color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
        .modal-btn{width:100%;padding:12px;border-radius:10px;border:none;cursor:pointer;font-size:14px;font-weight:700;font-family:'Cinzel',serif;transition:all 0.2s}
        .modal-btn-gold{background:linear-gradient(135deg,var(--gold),#b8860b);color:var(--bg);box-shadow:0 0 15px rgba(212,160,23,0.2)}
        .modal-btn-dim{background:rgba(255,255,255,0.06);color:var(--text-dim)}

        /* Video player */
        .video-container{width:100%;aspect-ratio:16/9;background:#000;border-radius:12px;overflow:hidden;position:relative;margin-bottom:16px}
        .video-container iframe{width:100%;height:100%;border:none}
        .video-timer{text-align:center;margin-bottom:16px}
        .timer-ring{width:80px;height:80px;margin:0 auto 8px;position:relative}
        .timer-text{font-size:24px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--gold)}

        /* Text input */
        .journal-input{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:10px;padding:12px;color:var(--text);font-family:'Crimson Pro',serif;font-size:14px;resize:none;outline:none;transition:border-color 0.2s;min-height:60px}
        .journal-input:focus{border-color:var(--gold)}
        .journal-input::placeholder{color:var(--text-dim)}
        .journal-entry{padding:12px;border-radius:10px;background:rgba(212,160,23,0.04);border:1px solid var(--border);margin-bottom:8px}
        .journal-date{font-size:10px;color:var(--text-dim);font-family:'JetBrains Mono',monospace}
        .journal-text{font-size:13px;color:var(--text);margin-top:4px;line-height:1.5}

        /* History tab */
        .history-tab{padding:8px 14px;border-radius:8px;border:1px solid var(--border);cursor:pointer;font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--text-dim);background:transparent;transition:all 0.2s}
        .history-tab.active{background:var(--gold-dim);border-color:var(--gold);color:var(--gold)}

        .hidden{display:none}

        /* Profile */
        .profile-avatar{width:90px;height:90px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:700;font-family:'Cinzel',serif;margin:0 auto;position:relative;cursor:pointer;transition:all 0.3s}
        .profile-avatar:hover{transform:scale(1.05)}
        .profile-avatar-ring{position:absolute;inset:-4px;border-radius:50%;border:3px solid var(--gold);box-shadow:0 0 15px rgba(212,160,23,0.3)}
        .profile-avatar img{width:100%;height:100%;border-radius:50%;object-fit:cover}
        .profile-edit-icon{position:absolute;bottom:0;right:0;width:28px;height:28px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:12px;border:2px solid var(--bg)}
        .profile-name{font-size:20px;font-weight:700;font-family:'Cinzel',serif;text-align:center;margin-top:12px}
        .profile-bio{font-size:12px;color:var(--text-dim);text-align:center;margin-top:4px;font-style:italic;max-width:280px;margin-left:auto;margin-right:auto;line-height:1.5}
        .profile-grade{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;border-radius:20px;font-size:13px;font-weight:700;font-family:'Cinzel',serif;margin-top:10px}
        .profile-stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-top:16px}
        .profile-stat{text-align:center;padding:10px 4px;background:rgba(255,255,255,0.02);border-radius:10px;border:1px solid var(--border)}
        .profile-stat-val{font-size:18px;font-weight:700;font-family:'JetBrains Mono',monospace}
        .profile-stat-label{font-size:9px;color:var(--text-dim);margin-top:2px}
        .medal{width:52px;height:52px;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:22px;position:relative}
        .medal-label{font-size:8px;font-family:'JetBrains Mono',monospace;margin-top:2px}
        .medal.locked{opacity:0.25;filter:grayscale(1)}
        .profile-input{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-family:'Crimson Pro',serif;font-size:14px;outline:none;transition:border-color 0.2s}
        .profile-input:focus{border-color:var(--gold)}
        .profile-input::placeholder{color:var(--text-dim)}
        .xp-bar-big{height:8px;background:rgba(212,160,23,0.08);border-radius:4px;overflow:hidden;margin-top:8px}
        .xp-bar-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-light));border-radius:4px;box-shadow:0 0 10px rgba(212,160,23,0.3);transition:width 0.6s}

        /* Install banner */
        .install-banner{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(180deg,transparent,var(--bg) 20%,var(--bg));padding:20px 16px 24px;z-index:500;text-align:center;display:none}
        .install-banner.show{display:block;animation:slideUp 0.4s ease}
        .install-btn{padding:14px 32px;border-radius:12px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--gold),#b8860b);color:var(--bg);font-size:15px;font-weight:700;font-family:'Cinzel',serif;box-shadow:0 0 20px rgba(212,160,23,0.3);width:100%;max-width:320px}
        .install-dismiss{background:none;border:none;color:var(--text-dim);font-size:12px;cursor:pointer;margin-top:8px;font-family:'Crimson Pro',serif}
        @keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}
    </style>
</head>
<body>
<div class="header">
    <div style="font-size:20px;margin-bottom:2px">✦</div>
    <div class="header-brand">L'Incantesimo del Denaro</div>
    <div class="header-sub" id="hSub">Giorno 1 · 🔥 0 giorni</div>
    <div><span class="tier-badge">INIZIAZIONE GRATUITA</span></div>
    <div class="lvl-wrap">
        <div class="lvl-labels"><span class="lvl-cur" id="lCur">◇ Apprendista</span><span class="lvl-nxt" id="lNxt"></span></div>
        <div class="lvl-track"><div class="lvl-fill" id="lFill" style="width:0%"></div></div>
        <div class="lvl-pts" id="lPts">0 pts</div>
    </div>
</div>
<div class="nav">
    <button class="nav-tab active" data-tab="rituale" onclick="go('rituale')">🕯️ Rituale</button>
    <button class="nav-tab" data-tab="diario" onclick="go('diario')">📖 Diario</button>
    <button class="nav-tab" data-tab="energia" onclick="go('energia')">⚡ Energia</button>
    <button class="nav-tab" data-tab="classifica" onclick="go('classifica')">🏆 Classifica</button>
    <button class="nav-tab" data-tab="referral" onclick="go('referral')">🚀 Invita</button>
    <button class="nav-tab" data-tab="profilo" onclick="go('profilo')">👤 Profilo</button>
    <button class="nav-tab" data-tab="premium" onclick="go('premium')" style="border-color:rgba(212,160,23,0.4);color:var(--gold)">👁️ Cerchio</button>
</div>
<div class="content">
<div id="tab-rituale"></div>
<div id="tab-diario" class="hidden"></div>
<div id="tab-energia" class="hidden"></div>
<div id="tab-classifica" class="hidden"></div>
<div id="tab-referral" class="hidden"></div>
<div id="tab-profilo" class="hidden"></div>
<div id="tab-premium" class="hidden"></div>
</div>
<div id="modalRoot"></div>

<!-- Install Banner -->
<div class="install-banner" id="installBanner">
    <div style="font-size:13px;color:var(--text);margin-bottom:10px;font-family:'Cinzel',serif">✦ Aggiungi alla schermata Home</div>
    <div style="font-size:11px;color:var(--text-dim);margin-bottom:14px;max-width:300px;margin-left:auto;margin-right:auto">Accedi all'Incantesimo con un tocco, come un'app. Nessun download.</div>
    <button class="install-btn" id="installBtn" onclick="installApp()">Installa L'Incantesimo</button>
    <div><button class="install-dismiss" onclick="dismissInstall()">Non ora</button></div>
</div>

<script>
// ===== STORAGE =====
function loadData(key, def) { try { return JSON.parse(localStorage.getItem('idd_'+key)) || def } catch(e) { return def } }
function saveData(key, val) { localStorage.setItem('idd_'+key, JSON.stringify(val)) }
function todayKey() { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}` }
function todayLabel() { const d=new Date(),dn=['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'],mn=['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];return`${dn[d.getDay()]} ${d.getDate()} ${mn[d.getMonth()]} ${d.getFullYear()}`}

// ===== DATA =====
const RITUALS = [
    {id:1,l:"Risveglio dell'Abbondanza",desc:"Visualizza il denaro come energia",dur:"5 min",a:"corona",p:10,ic:"🌅",type:"video",videoId:"PLACEHOLDER_VIDEO_1",timerSec:300},
    {id:2,l:"Formula della Gratitudine Finanziaria",desc:"Scrivi 3 cose per cui sei grato",dur:"",a:"cuore",p:15,ic:"📝",type:"gratitude",count:3,listKey:"gratitudine"},
    {id:3,l:"Incantesimo dell'Azione",desc:"Compi 1 azione concreta verso il guadagno",dur:"",a:"plesso",p:20,ic:"⚡",type:"action",listKey:"azioni"},
    {id:4,l:"Rituale dell'Osservazione",desc:"Analizza dove vanno i tuoi soldi oggi",dur:"",a:"occhio",p:12,ic:"👁️",type:"journal",prompt:"Dove sono andati i tuoi soldi oggi? Cosa hai osservato sul tuo flusso finanziario?",listKey:"osservazioni"},
    {id:5,l:"Pratica del Distacco",desc:"Rilascia la paura di perdere denaro",dur:"3 min",a:"cuore",p:12,ic:"🕊️",type:"meditation",timerSec:180},
    {id:6,l:"Invocazione dell'Opportunità",desc:"Cerca e contatta 1 opportunità",dur:"",a:"gola",p:18,ic:"🔮",type:"action",prompt:"Quale opportunità hai cercato o contattato oggi?",listKey:"opportunita"},
    {id:7,l:"Sigillo del Giorno",desc:"Riflessione serale su denaro ed energia",dur:"",a:"corona",p:13,ic:"✦",type:"journal",prompt:"Come è fluita l'energia del denaro oggi? Cosa hai imparato?",listKey:"sigilli"},
];

const CENTERS = [
    {id:"corona",n:"Corona",d:"Connessione alla fonte dell'abbondanza",ic:"👑",c:"#d4a017"},
    {id:"occhio",n:"Terzo Occhio",d:"Visione delle opportunità invisibili",ic:"👁️",c:"#9333ea"},
    {id:"gola",n:"Gola",d:"Comunicazione, vendita, persuasione",ic:"💎",c:"#3b82f6"},
    {id:"cuore",n:"Cuore",d:"Relazione con il denaro, dare e ricevere",ic:"💚",c:"#2dd4a8"},
    {id:"plesso",n:"Plesso Solare",d:"Volontà, azione, potere personale",ic:"☀️",c:"#f59e0b"},
    {id:"sacrale",n:"Sacrale",d:"Creatività, generazione, flusso",ic:"🔥",c:"#ec4899"},
    {id:"radice",n:"Radice",d:"Sicurezza, stabilità finanziaria, sopravvivenza",ic:"🪨",c:"#dc2626"},
];

const LEVELS = [{n:"Apprendista",m:0,i:"◇"},{n:"Adepto",m:500,i:"◈"},{n:"Mago",m:1500,i:"⬡"},{n:"Alchimista",m:3000,i:"⬢"},{n:"Maestro Incantatore",m:5000,i:"✦"}];

const GBOARD = [{r:1,n:"Alchimista_23",s:52,p:5120,l:"Maestro Incantatore",av:"A2",pro:1},{r:2,n:"LuceMistica",s:44,p:4350,l:"Alchimista",av:"LM",pro:1},{r:3,n:"OroInteriore",s:39,p:3800,l:"Alchimista",av:"OI"},{r:4,n:"Tu",s:0,p:0,l:"Apprendista",av:"TU",u:1},{r:5,n:"Risvegliato_7",s:21,p:2040,l:"Mago",av:"R7"},{r:6,n:"ViaAurea",s:18,p:1820,l:"Adepto",av:"VA"},{r:7,n:"CoscienzaLibera",s:14,p:1420,l:"Adepto",av:"CL"}];

const WHOP="https://whop.com/codice-del-passo-inverso/membership-fondatori/";
const AFF="https://whop.com/codice-del-passo-inverso/affiliates";
const PROD="https://whop.com/codice-del-passo-inverso/";

let tg=window.Telegram?.WebApp;if(tg){tg.ready();tg.expand()}

// ===== STATE =====
let S = { tab:"rituale", bm:"global", hov:null, diaryTab:"gratitudine", share:false };
function getTodayChecks() { return loadData('checks_'+todayKey(), {}) }
function setTodayCheck(id) { const c=getTodayChecks(); c[id]=true; saveData('checks_'+todayKey(), c) }
function getAllPts() {
    let total=0;
    // Count all historical days
    for(let i=0;i<localStorage.length;i++){
        const k=localStorage.key(i);
        if(k.startsWith('idd_checks_')){
            const dayChecks=JSON.parse(localStorage.getItem(k));
            RITUALS.forEach(r=>{if(dayChecks[r.id])total+=r.p});
            if(Object.keys(dayChecks).filter(k2=>dayChecks[k2]).length===7)total+=100;
        }
    }
    return total;
}
function getStreak() {
    let streak=0,d=new Date();
    while(true){
        const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        const c=loadData('checks_'+key,{});
        if(Object.keys(c).filter(k=>c[k]).length===7){streak++;d.setDate(d.getDate()-1)}
        else if(streak===0&&Object.keys(c).length>0){d.setDate(d.getDate()-1)} // today incomplete, check yesterday
        else if(streak===0){d.setDate(d.getDate()-1);const k2=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;const c2=loadData('checks_'+k2,{});if(Object.keys(c2).filter(k=>c2[k]).length===7){streak++;d.setDate(d.getDate()-1)}else break}
        else break;
    }
    return streak;
}
function getDayCount(){let count=0;for(let i=0;i<localStorage.length;i++){if(localStorage.key(i).startsWith('idd_checks_'))count++}return Math.max(1,count)}
function addToList(key, entry) { const list=loadData('list_'+key,[]); list.unshift({text:entry,date:todayKey(),ts:Date.now()}); saveData('list_'+key,list) }
function getList(key) { return loadData('list_'+key,[]) }

function lv(p){for(let i=LEVELS.length-1;i>=0;i--)if(p>=LEVELS[i].m)return LEVELS[i];return LEVELS[0]}
function getActivation(){
    const checks=getTodayChecks();
    const b={corona:30,occhio:25,gola:20,cuore:25,plesso:30,sacrale:20,radice:28},a={};
    CENTERS.forEach(c=>{const boost=RITUALS.filter(i=>i.a===c.id&&checks[i.id]).length*15;
    // Also add historical boost
    let hist=0;for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k.startsWith('idd_checks_')&&k!=='idd_checks_'+todayKey()){const dc=JSON.parse(localStorage.getItem(k));hist+=RITUALS.filter(r=>r.a===c.id&&dc[r.id]).length}}
    a[c.id]=Math.min(100,(b[c.id]||20)+boost+Math.min(hist*2,40))});return a}

// ===== NAVIGATION =====
function go(t){S.tab=t;document.querySelectorAll('.nav-tab').forEach(b=>{b.classList.remove('active','active-pink');if(b.dataset.tab===t){if(t==='referral')b.classList.add('active-pink');else b.classList.add('active')}});['rituale','diario','energia','classifica','referral','profilo','premium'].forEach(x=>document.getElementById('tab-'+x).classList.toggle('hidden',x!==t));render()}

// ===== MODALS =====
function closeModal(){document.getElementById('modalRoot').innerHTML='';render()}

function openVideo(ritual){
    const checks=getTodayChecks();
    if(checks[ritual.id]){return} // already done
    let timeLeft=ritual.timerSec;
    const m=document.getElementById('modalRoot');
    function renderTimer(){
        const min=Math.floor(timeLeft/60),sec=timeLeft%60;
        m.innerHTML=`<div class="modal-overlay" onclick="event.target===this&&closeModal()"><div class="modal" style="position:relative">
        <div style="text-align:center;margin-bottom:16px"><div style="font-size:28px;margin-bottom:8px">${ritual.ic}</div><div class="modal-title">${ritual.l}</div><div style="font-size:12px;color:var(--text-dim)">${ritual.desc}</div></div>

        m.innerHTML=`<div class="modal-overlay" onclick="event.target===this&&closeModal()"><div class="modal" style="position:relative">

        ${entries.map((e,i)=>`<div style="margin-bottom:10px"><div style="font-size:11px;color:var(--gold);margin-bottom:4px;font-family:'JetBrains Mono',monospace">Gratitudine ${i+1}</div><textarea class="journal-input" id="grat${i}" rows="2" placeholder="Sono grato per..." oninput="window._gratEntries[${i}]=this.value">${e}</textarea></div>`).join('')}
        <div style="margin-top:16px">${allFilled?`<button class="modal-btn modal-btn-gold" onclick="saveGratitude()">✦ Sigilla la Gratitudine (+${ritual.p} pts)</button>`:`<button class="modal-btn modal-btn-dim" style="cursor:default">Completa tutte e 3 le gratitudini</button>`}</div>
        </div></div>`;
        window._gratEntries=entries;

        completeRitual(ritual.id);
    };
    renderGrat();
}

function openRitual(id){
    const r=RITUALS.find(x=>x.id===id);
    if(!r)return;
    const checks=getTodayChecks();
    if(checks[r.id]){
        // Already completed — show what was logged
        if(r.listKey){
            S.diaryTab=r.listKey;go('diario');return;
        }
        return;
    }
    switch(r.type){
        case 'video': openVideo(r);break;
        case 'meditation': openMeditation(r);break;
        case 'gratitude': openGratitude(r);break;
        case 'action': openAction(r);break;
        case 'journal': openJournal(r);break;
    }
}

// ===== RENDER =====
function render(){
    const checks=getTodayChecks();
    const dn=Object.keys(checks).filter(k=>checks[k]).length;
    const p=getAllPts(),l=lv(p),ni=LEVELS.indexOf(l)+1,nx=ni<LEVELS.length?LEVELS[ni]:null;
    const pr=nx?((p-l.m)/(nx.m-l.m))*100:100;
    const streak=getStreak(),dayCount=getDayCount();

    document.getElementById('hSub').textContent=`Giorno ${dayCount} · 🔥 ${streak} giorni`;
    document.getElementById('lCur').textContent=`${l.i} ${l.n}`;
    document.getElementById('lNxt').textContent=nx?`${nx.i} ${nx.n}`:'';
    document.getElementById('lFill').style.width=pr+'%';
    document.getElementById('lPts').textContent=`${p.toLocaleString()} pts`+(nx?` · ${(nx.m-p).toLocaleString()} al prossimo grado`:'');

    // Update user in leaderboard
    const profileData=loadData('profile',{name:'Tu',bio:'',avatar:''});
    GBOARD.forEach(e=>{if(e.u){e.s=streak;e.p=p;e.l=l.n;e.n=profileData.name||'Tu';e.av=(profileData.name||'TU').substring(0,2).toUpperCase()}});
    GBOARD.sort((a,b)=>b.p-a.p);GBOARD.forEach((e,i)=>e.r=i+1);

    // === RITUALE ===
    let h=`<div class="card glow"><div style="text-align:center;margin-bottom:16px"><div style="font-size:14px;font-weight:600;font-family:'Cinzel',serif;color:var(--gold)">Rituale Quotidiano del Denaro</div><div style="font-size:11px;color:var(--text-dim);margin-top:2px">${todayLabel()}</div><div style="margin-top:8px;font-size:28px;font-weight:700;font-family:'JetBrains Mono',monospace;color:${dn===7?'var(--green)':'var(--gold)'}">${dn}/7 <span style="font-size:12px;color:var(--text-dim)">incantesimi</span></div></div>`;
    RITUALS.forEach(r=>{
        const done=checks[r.id];
        const center=CENTERS.find(c=>c.id===r.a);
        const typeIcon=r.type==='video'?'▶️':r.type==='meditation'?'🧘':r.type==='gratitude'?'📝':r.type==='action'?'⚡':'📖';
        h+=`<div class="ritual-item" style="${done?`background:${center.c}08;border-color:${center.c}30`:''}" onclick="openRitual(${r.id})">
        <div class="ritual-box" style="${done?`border-color:${center.c};background:${center.c}`:''}">${done?'<span style="color:var(--bg);font-size:11px">✦</span>':r.ic}</div>
        <div style="flex:1"><div style="font-size:12px;${done?`color:${center.c};text-decoration:line-through;opacity:0.8`:''}">${r.l}</div>
        <div style="font-size:10px;color:var(--text-dim);margin-top:1px">${center.ic} ${center.n} · ${typeIcon} ${r.dur||r.type==='gratitude'?'Scrivi 3':r.type==='action'?'Scrivi':'Scrivi'} · +${r.p} pts</div></div>
        <div style="font-size:10px;color:${done?'var(--green)':'var(--text-dim)'}">${done?'✓':'→'}</div></div>`;
    });
    h+='</div>';
    if(dn===7)h+=`<div style="background:linear-gradient(135deg,rgba(212,160,23,0.15),rgba(147,51,234,0.1));border-radius:14px;padding:24px;text-align:center;border:1px solid rgba(212,160,23,0.3);margin-bottom:16px;box-shadow:0 0 30px rgba(212,160,23,0.1)"><div style="font-size:32px;margin-bottom:6px">✦</div><div style="font-size:18px;font-weight:700;color:var(--gold);font-family:'Cinzel',serif">Incantesimo Completato</div><div style="font-size:13px;color:var(--text-dim);margin-top:6px">Il flusso dell'abbondanza è attivo. +100 punti bonus.</div></div>`;
    document.getElementById('tab-rituale').innerHTML=h;

    // === DIARIO ===
    const DIARY_TABS=[
        {key:"gratitudine",label:"🙏 Gratitudine",title:"Elenco della Gratitudine"},
        {key:"azioni",label:"⚡ Azioni",title:"Azioni verso il Guadagno"},
        {key:"osservazioni",label:"👁️ Osservazioni",title:"Osservazioni Finanziarie"},
        {key:"opportunita",label:"🔮 Opportunità",title:"Opportunità Contattate"},

    let di=`<div style="display:flex;gap:5px;overflow-x:auto;margin-bottom:16px;-webkit-overflow-scrolling:touch">`;

    en+='</div>';

// ===== PWA: Service Worker & Install Prompt =====
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}

let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
    e.preventDefault();
    deferredPrompt=e;
    // Show install banner after 10 seconds if not dismissed before
    if(!localStorage.getItem('idd_install_dismissed')){
        setTimeout(()=>{document.getElementById('installBanner').classList.add('show')},10000);
    }
});

function installApp(){
    if(deferredPrompt){
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(r=>{
            if(r.outcome==='accepted'){document.getElementById('installBanner').classList.remove('show')}
            deferredPrompt=null;
        });
    } else {
        // iOS fallback
        const ib=document.getElementById('installBanner');
        ib.innerHTML=`<div style="padding:16px;text-align:center"><div style="font-size:14px;color:var(--gold);font-family:'Cinzel',serif;margin-bottom:10px">📱 Come installare</div><div style="font-size:12px;color:var(--text-dim);line-height:1.6"><strong>iPhone/iPad:</strong> Tocca <span style="font-size:16px">⬆️</span> (Condividi) in basso → "Aggiungi a Home"<br><br><strong>Android:</strong> Tocca ⋮ (menu) in alto → "Aggiungi a schermata Home"</div><button class="install-dismiss" onclick="dismissInstall()" style="margin-top:12px">Ho capito</button></div>`;
    }
}

function dismissInstall(){
    document.getElementById('installBanner').classList.remove('show');
    localStorage.setItem('idd_install_dismissed','1');
}

// Show iOS install hint
if(/iPhone|iPad|iPod/.test(navigator.userAgent)&&!navigator.standalone&&!localStorage.getItem('idd_install_dismissed')){
    setTimeout(()=>{document.getElementById('installBanner').classList.add('show')},15000);
}
</script>
